name: Deploy to Fly.io

# Déploie automatiquement à chaque push sur main.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Sérialise les déploiements : jamais deux en parallèle.
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --remote-only : build sur l'infra Fly (pas de Docker dans le runner).
      # --ha=false : une seule machine (cohérent avec le volume mono-machine).
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
